<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  </head>

  <body class="bg-[#c6def7] min-h-screen">
    <!-- ================= HEADER ================= -->
    <header class="bg-slate-100 shadow-sm">
      <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
        <!-- Logo -->
        <div class="flex items-center gap-2">
          <img class="w-10" src="./assets/github-logo.png" alt="github logo" />
          <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
        </div>

        <!-- Search + Button -->
        <div class="flex items-center gap-3">
          <input
            type="search"
            placeholder="Search issues..."
            class="input input-bordered w-64"
          />

          <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>
            New Issue
          </button>
        </div>
      </div>
    </header>

    <!-- ================= MAIN ================= -->
    <main class="w-[1400px] mx-auto mt-10">
      <!-- Filter Buttons -->
      <div class="bg-white shadow-md rounded-md p-4 flex gap-3 mb-4">
        <button id="all-issues" class="btn btn-sm btn-primary w-28">All</button>

        <button class="btn btn-sm w-28">Open</button>

        <button class="btn btn-sm w-28">Closed</button>
      </div>

      <!-- Status Section -->
      <div
        class="bg-white shadow-md rounded-md p-6 flex justify-between items-center mb-6"
      >
        <div class="flex items-center gap-3">
          <div class="rounded-full bg-[#ECE4FF] p-2">
            <img class="w-10 h-10" src="./assets/Aperture.png" alt="icon" />
          </div>

          <div>
            <h2 class="font-bold text-xl">50 Issues</h2>
            <p class="text-gray-400 text-sm">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <div class="flex gap-4 text-sm">
          <p><span class="text-[#00A96E]">●</span> Open</p>
          <p><span class="text-[#A855F7]">●</span> Closed</p>
        </div>
      </div>

      <!-- ================= ISSUES GRID ================= -->
      <div
        id="allCards"
        class=" grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-2 gap-y-4 "
      >
