<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  </head>

  <body class="bg-[#c6def7] min-h-screen">
    <!-- Spinner -->
    <div
      id="loader"
      class="fixed inset-0 flex items-center justify-center bg-white z-50 hidden"
    >
      <div
        class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"
      ></div>
    </div>

    <!-- Redirect if not logged in -->
    <script>
      if (!localStorage.getItem("isLoggedIn")) {
        window.location.href = "login.html";
      }
    </script>

    <!-- header -->
    <header class="bg-slate-100 shadow-sm">
      <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
        <!-- Logo -->
        <div class="flex items-center gap-2">
          <img class="w-10" src="./assets/github-logo.png" alt="github logo" />
          <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
        </div>

        <!-- Search + Button -->
        <div class="flex items-center gap-3">
          <input
          id="search-input"
            type="search"
            placeholder="Search issues..."
            class="input input-bordered w-64"
          />

          <button id="search-btn" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>
            Search
          </button>
        </div>
      </div>
    </header>

    <!-- main -->
    <main class="w-[1400px] mx-auto mt-10">
      <!-- Filter Buttons -->
      <div class="bg-white shadow-md rounded-md p-4 flex gap-3 mb-4">
        <button id="all-issues" class="btn btn-sm btn-primary w-28">All</button>
        <button id="open-issues" class="btn btn-sm btn-outline w-28">Open</button>
        <button id="closed-issues" class="btn btn-sm btn-outline w-28">Closed</button>
      </div>

      <!-- Status Section -->
      <div class="bg-white shadow-md rounded-md p-6 flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
          <div class="rounded-full bg-[#ECE4FF] p-2">
            <img class="w-10 h-10" src="./assets/Aperture.png" alt="icon" />
          </div>

          <div>
            <h2 id="issue-count" class="font-bold text-xl">0 Issues</h2>
            <p class="text-gray-400 text-sm">Track and manage your project issues</p>
          </div>
        </div>

        <div class="flex gap-4 text-sm">
          <p><span class="text-[#00A96E]">●</span> Open</p>
          <p><span class="text-[#A855F7]">●</span> Closed</p>
        </div>
      </div>

      <!-- issues card -->
      <div
        id="allCards"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-2 gap-y-4"
      >
        <!-- cadrd inject  -->
      </div>

      <!-- modal -->
      <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl space-y-4">
          <h2 id="modal-title" class="text-xl font-bold"></h2>

          <div class="flex gap-2 text-sm items-center">
            <span id="modal-status" class="badge badge-success"></span>
            <p>
              Opened by <span id="modal-author"></span> • <span id="modal-date"></span>
            </p>
          </div>

          <div id="modal-labels" class="flex gap-2 flex-wrap"></div>

          <p id="modal-description"></p>

          <div class="bg-gray-100 p-4 rounded flex justify-between">
            <div>
              <p class="text-gray-500 text-sm">Assignee</p>
              <p id="modal-assignee"></p>
            </div>

            <div>
              <p class="text-gray-500 text-sm">Priority</p>
              <span id="modal-priority" class="badge badge-error"></span>
            </div>
          </div>

          <div class="modal-action">
            <form method="dialog">
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <!-- js -->
    <script src="./Script/script.js"></script>
  </body>
</html>
