<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker - Login</title>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  </head>

  <body class="bg-base-200 min-h-screen flex items-center justify-center">
    <section class="w-[420px] bg-white p-8 rounded-xl shadow-lg space-y-5">
      <div class="text-center space-y-3">
        <img src="./assets/github-logo.png" class="w-14 mx-auto" />

        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>

        <p class="text-gray-500">Sign in to manage your issues</p>
      </div>

      <!-- LOGIN FORM -->

      <div class="space-y-4">
        <div>
          <label class="font-semibold">Username</label>

          <input
            id="username"
            type="text"
            placeholder="Enter Username"
            class="input input-bordered w-full bg-base-200"
          />

          <p class="text-sm text-primary">Default: admin</p>
        </div>

        <div>
          <label class="font-semibold">Password</label>

          <input
            id="password"
            type="password"
            placeholder="Enter Password"
            class="input input-bordered w-full bg-base-200"
          />

          <p class="text-sm text-primary">Default: admin123</p>
        </div>

        <button id="loginBtn" class="btn btn-primary w-full mt-2">
          Sign In
        </button>

        <p id="errorMsg" class="text-red-500 text-sm hidden">
          Invalid username or password
        </p>
      </div>

      <div class="text-center text-gray-400">or</div>

      <div class="bg-base-200 p-4 rounded text-center">
        <p class="font-semibold">Demo Credentials</p>
        <p>Username: <span class="text-gray-500">admin</span></p>
        <p>Password: <span class="text-gray-500">admin123</span></p>
      </div>
    </section>
    <script src="./Script/login.js"></script>
  </body>
</html>
