<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <section class="login-section  w-[430px] p-6 mt-16 mx-auto shadow-lg space-y-5 rounded-xl ">
        <div class="w-full mx-auto">
            <div class="w-14 mx-auto">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h2 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>
            <p class="text-[#64748B] text-center">Sign in to manage your issues</p>
            </div>
            
            <fieldset class="fieldset mt-4">

                    <!-- User Name -->
                    <label class="label text-neutral font-bold">Username</label>
                    <input maxlength="11" minlength="11"
                        class="user-name  input w-full bg-base-200"
                        type="text"
                        placeholder="Enter Username"
                        id="Username" />
                        <p class=" text-primary font-blod">Default: admin</p>

                    <!-- PIN -->
                    <label class="label text-neutral font-bold">Password</label>
                    <input maxlength="6" minlength="6"
                        class="input w-full bg-base-200"
                        type="password"
                        placeholder="Password"
                        id="user-pin" />
                        <p class=" text-primary font-blod">Default: admin123</p>

                    <!-- Button -->
                    <button id="login-btn" class="btn btn-primary mt-4 ">
                        Sign In
                    </button>
                </fieldset>

                <div><p class="text-[#64748B] text-center">or</p></div>

                <p class="text-center">Demo Credentials:</p>
                <div class="borde bg-base-200 w-full p-5 text-center">
                    <p class="font-bold">Username: <span class="text-[#64748B]">admin</span></p>
                    <p class="font-bold">Password: <span class="text-[#64748B]">admin123</span></p>
                </div>
    </section>
</body>
</html>
